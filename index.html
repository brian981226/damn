<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記分板</title>
    <!-- 拔掉容易跑版的草書，只留乾淨的明體 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* ====== 1. 外層背景：米白色 + 清晰有質感的斜紋布料紋理 ====== */
        body { 
            font-family: 'Noto Serif TC', serif; 
            background-color: #f7f4ec; 
            background-image: repeating-linear-gradient(45deg, rgba(160, 140, 120, 0.1) 0, rgba(160, 140, 120, 0.1) 1.5px, transparent 1.5px, transparent 12px);
            margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden; 
        }

        /* 🍁 逼真楓葉畫布：z-index=99 確保楓葉飄過所有畫面最上層 */
        #leafCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 99; pointer-events: none; }
        
        .gold-text {
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }

        /* ====== 2. 內層看板：乾淨無斑點的極致深紅漸層 ====== */
        .container { 
            max-width: 900px; 
            margin: 40px auto; 
            padding: 30px; 
            position: relative; 
            z-index: 1; 
            
            background-color: #0d0305;
            background-image: radial-gradient(circle at top center, #3a1019 0%, #0d0305 100%);
            
            color: #fdfaf4; 
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(212, 175, 55, 0.2);
        }

        /* 手機版響應式微調 */
        @media (max-width: 768px) {
            .container { margin: 15px auto; padding: 15px; border-radius: 8px; }
        }

        /* 標題簡化 */
        h1.main-title { 
            font-weight: 900; letter-spacing: 8px; text-align: center; 
            margin-bottom: 25px; margin-top: 10px; font-size: 3em; 
        }

        h2 { 
            color: #fdfaf4; font-weight: 700; letter-spacing: 2px; 
            border-left: 6px solid #d4af37; padding-left: 12px; margin-top: 0; 
            display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
        }
        
        .nav-bar { 
            display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 25px; 
            background: rgba(15, 5, 8, 0.85); padding: 8px; border-radius: 6px; 
            border: 1px solid #4a2a18; box-shadow: 0 8px 32px rgba(0,0,0,0.8); 
            backdrop-filter: blur(10px);
        }
        .nav-bar button { 
            flex: 1; padding: 12px; font-size: 1.05em; font-family: 'Noto Serif TC', serif; font-weight: bold; 
            background: transparent; color: #a89f91; border: 1px solid transparent; border-radius: 4px; 
            cursor: pointer; transition: 0.3s; white-space: nowrap; position: relative; 
        }
        .nav-bar button:hover { color: #fcf6ba; text-shadow: 0 0 8px #d4af37; }
        .nav-bar button.active { 
            color: #111; font-weight: 900;
            background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
            border: none;
        }

        .section { display: none; animation: fadeInLuxury 0.4s cubic-bezier(0.1, 0.8, 0.2, 1); }
        .section.active { display: block; }
        @keyframes fadeInLuxury { from { opacity: 0; transform: scale(0.98); filter: brightness(1.5); } to { opacity: 1; transform: scale(1); filter: brightness(1); } }
        
        .card { 
            background: rgba(20, 8, 12, 0.85); backdrop-filter: blur(12px);
            padding: 25px; border-radius: 8px; 
            border: 1px solid #4a2a18; border-top: 2px solid #d4af37; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.9), inset 0 0 20px rgba(212,175,55,0.05); 
            margin-bottom: 25px; position: relative; 
        }

        .input-group { margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: center; }
        input[type="number"], input[type="text"], textarea { 
            padding: 12px; background: rgba(0,0,0,0.6); border: 1px solid #5a3a29; color: #fcf6ba; 
            border-radius: 4px; flex-grow: 1; min-width: 120px; font-size: 1.1em; font-family: 'Noto Serif TC', serif; font-weight: bold; transition: 0.3s; 
        }
        input:focus, textarea:focus { border-color: #d4af37; box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); outline: none; background: rgba(20,5,10,0.8); }
        input::placeholder, textarea::placeholder { color: #666; font-weight: normal; text-align: center; }

        button.action-btn { 
            padding: 14px 25px; font-size: 1.1em; font-family: 'Noto Serif TC', serif; font-weight: 900; 
            border: none; border-radius: 4px; cursor: pointer; 
            background: linear-gradient(135deg, #c2183b, #7a0c22); color: #fff; 
            box-shadow: 0 4px 15px rgba(194, 24, 59, 0.5); border: 1px solid #ff4d6d;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); white-space: nowrap; letter-spacing: 2px;
        }
        button.action-btn:hover { background: linear-gradient(135deg, #e31e47, #990f2b); transform: scale(1.02); box-shadow: 0 8px 25px rgba(194, 24, 59, 0.8); }
        button.action-btn:active { transform: scale(0.95); }
        
        .btn-gold { background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728) !important; color: #111 !important; border: none !important; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.5) !important; }
        .btn-gold:hover { filter: brightness(1.2); box-shadow: 0 8px 25px rgba(212, 175, 55, 0.8) !important; }

        .btn-dark { background: linear-gradient(135deg, #333, #111) !important; color: #d4af37 !important; border: 1px solid #d4af37 !important; box-shadow: none !important; }
        .btn-dark:hover { background: #d4af37 !important; color: #000 !important; box-shadow: 0 0 15px #d4af37 !important; }

        .btn-small { padding: 6px 12px; font-size: 0.85em; margin-left: 8px; font-weight: bold; letter-spacing: 1px; }
        
        .sort-controls { display: flex; gap: 5px; font-size: 0.85em; flex-wrap: wrap; }
        .sort-controls button { background: rgba(0,0,0,0.5); color: #888; border: 1px solid #444; padding: 5px 10px; border-radius: 4px; cursor: pointer; transition: 0.3s; white-space: nowrap; font-family: 'Noto Serif TC', serif; }
        .sort-controls button.active { color: #111; border-color: #d4af37; background: linear-gradient(135deg, #bf953f, #b38728); font-weight: bold; box-shadow: 0 0 10px rgba(212,175,55,0.4); }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; cursor: default; }
        .table-wrapper { overflow-x: auto; }
        
        /* 統一設定 border-left 寬度為 4px，確保對齊！ */
        th, td { padding: 16px 12px; text-align: left; border-bottom: 1px solid #3a1c22; white-space: nowrap;}
        th { background: rgba(212, 175, 55, 0.05); color: #d4af37; font-weight: 900; letter-spacing: 2px; border-bottom: 2px solid #d4af37; }
        td strong { color: #fcf6ba; font-size: 1.3em; text-shadow: 0 0 5px rgba(252, 246, 186, 0.5); }
        .stat-zimo { color: #4caf50; font-weight: bold; text-shadow: 0 0 5px rgba(76,175,80,0.4); }
        .stat-fang { color: #ff5252; font-weight: bold; text-shadow: 0 0 5px rgba(255,82,82,0.4); }
        
        tbody tr { transition: all 0.3s ease; border-left: 4px solid transparent; }
        tbody tr:hover { background: rgba(212, 175, 55, 0.05); border-left: 4px solid #d4af37; }

        /* ========================================================
           👑 3. 專屬前三名純 CSS 光影特效 (無漢字/無表情符號，拔除流光)
           ======================================================== */
        .rank-1, .rank-2, .rank-3 {
            position: relative;
            z-index: 1;
            overflow: hidden; 
        }
        .rank-1 td, .rank-2 td, .rank-3 td {
            position: relative;
            z-index: 2; 
            border-bottom: 1px solid rgba(0,0,0,0.2) !important;
        }
        
        /* 每個排名的專屬底色與光暈 */
        .rank-1 { 
            background: linear-gradient(90deg, rgba(212, 175, 55, 0.25) 0%, rgba(0,0,0,0) 100%) !important;
            border-left: 4px solid #fcf6ba !important; 
            animation: pulseGlow1 2s infinite alternate !important;
        }
        .rank-2 { 
            background: linear-gradient(90deg, rgba(168, 168, 168, 0.2) 0%, rgba(0,0,0,0) 100%) !important;
            border-left: 4px solid #e0eaf5 !important; 
            animation: pulseGlow2 2s infinite alternate !important;
        }
        .rank-3 { 
            background: linear-gradient(90deg, rgba(168, 123, 81, 0.2) 0%, rgba(0,0,0,0) 100%) !important;
            border-left: 4px solid #e3c4a8 !important; 
            animation: pulseGlow3 2s infinite alternate !important;
        }

        @keyframes pulseGlow1 { 0% { box-shadow: inset 4px 0 10px rgba(212,175,55,0.1); } 100% { box-shadow: inset 8px 0 25px rgba(252,246,186,0.4); } }
        @keyframes pulseGlow2 { 0% { box-shadow: inset 4px 0 10px rgba(168,168,168,0.1); } 100% { box-shadow: inset 8px 0 25px rgba(224,234,245,0.3); } }
        @keyframes pulseGlow3 { 0% { box-shadow: inset 4px 0 10px rgba(168,123,81,0.1); } 100% { box-shadow: inset 8px 0 25px rgba(227,196,168,0.3); } }
        /* ======================================================== */

        .history-box { max-height: 300px; overflow-y: auto; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 6px; font-size: 1.05em; border: 1px solid #4a2a18; box-shadow: inset 0 0 15px rgba(0,0,0,0.8); }
        .log-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px solid #33161d; padding-bottom: 12px; color: #ccc; transition: 0.2s; }
        .log-item:hover { color: #fff; padding-left: 5px; border-color: #d4af37; }
        .invalid-log { text-decoration: line-through; color: #ff5252; opacity: 0.5; }
        
        .honor-board { padding: 0; margin-top: 15px; }
        .honor-item { 
            background: linear-gradient(90deg, rgba(212,175,55,0.1) 0%, rgba(0,0,0,0.4) 100%); 
            border-left: 6px solid #d4af37; padding: 20px; margin-bottom: 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-radius: 0 8px 8px 0; transition: 0.3s; flex-wrap: wrap; gap: 10px; 
            border-top: 1px solid rgba(212,175,55,0.2); border-right: 1px solid rgba(212,175,55,0.1); border-bottom: 1px solid rgba(212,175,55,0.2); 
        }
        .honor-item:hover { transform: translateX(8px) scale(1.01); box-shadow: -5px 5px 20px rgba(212, 175, 55, 0.2); background: linear-gradient(90deg, rgba(212,175,55,0.2) 0%, rgba(0,0,0,0.6) 100%); }
        .honor-text { font-size: 1.3em; color: #fcf6ba; font-weight: 900; text-shadow: 0 0 10px rgba(212, 175, 55, 0.8); }
        .honor-user { color: #aaa; font-size: 0.95em; font-weight: normal; margin-left: 10px; }

        .archive-content { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #5a3a29; animation: fadeInLuxury 0.3s ease-out; }
        .archive-content h4 { color: #d4af37; margin-top: 0; margin-bottom: 10px; font-size: 1.2em; text-shadow: 0 0 8px rgba(212,175,55,0.4); }
        
        /* 特效畫布 */
        .click-ripple {
            position: fixed; border-radius: 50%; border: 3px solid rgba(252, 246, 186, 0.8);
            transform: translate(-50%, -50%); animation: rippleAnim 0.5s ease-out forwards;
            pointer-events: none; z-index: 9999; box-shadow: 0 0 20px #d4af37, inset 0 0 15px #d4af37;
        }
        @keyframes rippleAnim { 0% { width: 0; height: 0; opacity: 1; border-width: 6px; } 100% { width: 120px; height: 120px; opacity: 0; border-width: 1px; } }

        /* 🔥 占卜專用樣式 */
        .fortune-container { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .fortune-result-card { 
            background: rgba(10,2,5,0.9); border: 2px solid #d4af37; border-radius: 8px; 
            padding: 30px; margin-top: 20px; max-width: 500px; width: 100%; box-sizing: border-box;
            display: none; transition: all 0.5s ease; box-shadow: 0 0 30px rgba(212,175,55,0.2), inset 0 0 20px rgba(212,175,55,0.1);
            position: relative; overflow: hidden; backdrop-filter: blur(5px);
        }
        .fortune-result-card::before { content: '運勢'; position: absolute; top: -10px; right: 10px; font-size: 6em; opacity: 0.05; font-weight: 900; color: #d4af37; pointer-events: none; text-shadow: 0 0 20px #d4af37; }
        .fortune-icon { font-size: 5rem; margin-bottom: 10px; filter: drop-shadow(0 0 20px rgba(252,246,186,0.5)); }
        .fortune-title { font-size: 2.2em; font-weight: 900; margin-bottom: 15px; letter-spacing: 4px; }
        .fortune-desc { font-size: 1.15em; line-height: 1.8; color: #ddd; text-align: left; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 4px; border-left: 4px solid #d4af37; }

        /* 防呆總分顏色 */
        .total-zero { color: #4caf50 !important; font-family: monospace; text-shadow: 0 0 10px rgba(76,175,80,0.6); }
        .total-error { color: #ff5252 !important; font-family: monospace; font-weight: bold; text-shadow: 0 0 10px rgba(255,82,82,0.6); animation: pulse 1s infinite alternate; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4a2a18; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #d4af37; }
    </style>
</head>
<body>

    <canvas id="leafCanvas"></canvas>
    
    <div class="container">
        <h1 class="main-title gold-text">記分板</h1>

        <div class="nav-bar">
            <button id="btn-tab-main" class="active" onclick="switchTab('tab-main', this)">📊 籌碼排行</button>
            <button id="btn-tab-action" onclick="switchTab('tab-action', this)">🀄 點數裁決</button>
            <button id="btn-tab-fortune" onclick="switchTab('tab-fortune', this)">⛩️ 今日占卜</button>
            <button id="btn-tab-honor" onclick="switchTab('tab-honor', this)">🌟 榮譽殿堂</button>
            <button id="btn-tab-rules" onclick="switchTab('tab-rules', this)">📜 規則</button>
            <button id="btn-tab-search" onclick="switchTab('tab-search', this)">👁️ 查詢</button>
            <button id="btn-tab-admin" onclick="switchTab('tab-admin', this)">⚙️ 設置</button>
        </div>

        <div id="tab-main" class="section active">
            <div class="card">
                <h2>
                    <span class="gold-text">排行榜監控 
                        <span id="totalCheck" style="font-size: 0.55em; margin-left: 15px; padding: 4px 10px; border-radius: 4px; border: 1px solid currentColor; letter-spacing: 0;">籌碼核算中...</span>
                    </span>
                    <div class="sort-controls">
                        <button id="sortScoreBtnId" class="active" onclick="setScoreSort('id')">依編號</button>
                        <button id="sortScoreBtnPts" onclick="setScoreSort('score')">依點數</button>
                        <button id="sortScoreBtnZimo" onclick="setScoreSort('zimo')">依自摸</button>
                        <button id="sortScoreBtnFang" onclick="setScoreSort('fangqiang')">依放槍</button>
                    </div>
                </h2>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr><th>編號</th><th>名號</th><th>當局總籌碼</th><th>自摸</th><th>放槍</th></tr>
                        </thead>
                        <tbody id="scoreboardBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="tab-fortune" class="section">
            <div class="card" style="border-top-color: #d4af37;">
                <h2 style="border-left-color: #d4af37;"><span class="gold-text">⛩️ 今日運勢占卜</span></h2>
                <div class="fortune-container">
                    <p style="color: #aaa; margin-bottom: 20px;">請輸入編號，透過量子演算抽取今日籤詩。<br><span style="color:#ff4d6d; font-weight:bold;">⚠️ 注意：每人每 12 小時僅能抽取一次，抽完即鎖死！</span></p>
                    
                    <div class="input-group">
                        <input type="number" id="fortuneTargetId" placeholder="輸入您的編號">
                        <button id="btnDrawFortune" class="action-btn btn-gold" onclick="drawFortune()">奉納點數並抽籤</button>
                    </div>
                    
                    <div id="fortuneResult" class="fortune-result-card">
                        <div id="fortuneIcon" class="fortune-icon">❓</div>
                        <div id="fortuneTitle" class="fortune-title gold-text">演算中...</div>
                        <div id="fortuneDesc" class="fortune-desc">正在連結阿卡西紀錄獲取您的今日運勢...</div>
                        <div id="fortuneTimeLeft" style="margin-top: 15px; font-size: 0.9em; color: #aaa; font-weight: bold; display: none;"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-action" class="section">
            <div class="card" style="border-top-color: #c2183b;">
                <h2 style="border-left-color: #c2183b; color: #ff4d6d;">🎯 放槍裁決 (胡牌)</h2>
                <div class="input-group">
                    <input type="number" id="ronWinner" placeholder="贏家編號">
                    <input type="number" id="ronLoser" placeholder="放槍者編號">
                    <input type="number" id="ronPoints" placeholder="總台數/分數">
                </div>
                <button class="action-btn" style="width:100%;" onclick="recordRon()">登記放槍</button>
            </div>

            <div class="card" style="border-top-color: #d4af37;">
                <h2 style="border-left-color: #d4af37;"><span class="gold-text">✨ 自摸裁決 (一贏三)</span></h2>
                <div class="input-group" style="margin-bottom: 10px;">
                    <input type="number" id="tsumoWinner" placeholder="自摸贏家編號">
                </div>
                <div class="input-group">
                    <input type="number" id="tsumoL1" placeholder="輸家1 編號" style="width:40%;">
                    <input type="number" id="tsumoP1" placeholder="支付點數" style="width:40%;">
                </div>
                <div class="input-group">
                    <input type="number" id="tsumoL2" placeholder="輸家2 編號" style="width:40%;">
                    <input type="number" id="tsumoP2" placeholder="支付點數" style="width:40%;">
                </div>
                <div class="input-group">
                    <input type="number" id="tsumoL3" placeholder="輸家3 編號" style="width:40%;">
                    <input type="number" id="tsumoP3" placeholder="支付點數" style="width:40%;">
                </div>
                <button class="action-btn btn-gold" style="width:100%;" onclick="recordTsumo()">登記自摸</button>
            </div>

            <div class="card" style="border-top-color: #888;">
                <h2 style="border-left-color: #888; color: #ccc;">⚙️ 快速微調 (手動修正)</h2>
                <div class="input-group">
                    <input type="number" id="adjId" placeholder="目標編號">
                    <input type="number" id="adjPoints" placeholder="調整分數 (正加, 負扣)">
                </div>
                <button class="action-btn btn-dark" style="width:100%;" onclick="recordAdjust()">執行微調</button>
            </div>

            <div class="card" style="border-top-color: #d4af37;">
                <h2 style="border-left-color: #d4af37;"><span class="gold-text">🎖️ 特殊牌型登錄 (永久保存)</span></h2>
                <div class="input-group">
                    <input type="number" id="honorId" placeholder="目標編號">
                    <input type="text" id="honorName" placeholder="牌型描述 (例：大四喜)" style="flex-grow: 1; text-align: left;">
                    <input type="number" id="honorTai" placeholder="台數" style="width: 80px;">
                </div>
                <button class="action-btn btn-gold" style="width:100%;" onclick="recordHonor()">新增至榮譽殿堂</button>
            </div>
        </div>

        <div id="tab-honor" class="section">
            <div class="card" style="border-top-color: #d4af37;">
                <h2 style="border-left-color: #d4af37;">
                    <span class="gold-text">榮譽殿堂 (Hall of Fame)</span>
                    <div class="sort-controls">
                        <button id="sortHonorBtnTime" class="active" onclick="setHonorSort('time')">最新發生</button>
                        <button id="sortHonorBtnTai" onclick="setHonorSort('tai')">依台數</button>
                        <button id="sortHonorBtnId" onclick="setHonorSort('id')">依編號</button>
                    </div>
                </h2>
                <div id="honorList" class="honor-board"></div>
            </div>
        </div>

        <div id="tab-rules" class="section">
            <div class="card" style="border-top-color: #d4af37;">
                <h2 style="border-left-color: #d4af37;">
                    <span class="gold-text">📜 當前對局規則</span>
                    <button class="action-btn btn-small btn-dark" onclick="editRules()">修改規則</button>
                </h2>
                
                <div id="rulesDisplay" style="white-space: pre-wrap; line-height: 1.8; font-size: 1.1em; color: #ddd; margin-top: 15px; padding: 20px; background: rgba(0,0,0,0.6); border-radius: 4px; border: 1px solid #5a3a29;">
                    讀取中...
                </div>

                <div id="rulesEditArea" style="display: none; margin-top: 15px;">

    <script>
        // --- 點擊波紋特效 (流金炸裂) ---
        document.addEventListener('click', function(e) {
            const ripple = document.createElement('div');
            ripple.className = 'click-ripple';
            ripple.style.left = e.clientX + 'px';
            ripple.style.top = e.clientY + 'px';
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 500);
        });

        // ==========================================
        // 🍁 逼真楓葉掉落背景引擎
        // ==========================================
        const leafCanvas = document.getElementById('leafCanvas');
        const leafCtx = leafCanvas.getContext('2d');
        
        function resizeCanvas() {
            leafCanvas.width = window.innerWidth;
            leafCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const leafImages = [];
        const leafSources = ['leaf1.png', 'leaf2.png', 'leaf3.png']; 
        let imagesLoaded = 0;

        leafSources.forEach(src => {
            const img = new Image();
            img.src = src;
            img.onload = () => {
                imagesLoaded++;
                if (imagesLoaded === leafSources.length) {
                    initLeaves();
                }
            };
            img.onerror = () => {
                imagesLoaded++;
                console.warn(`無法載入圖片: ${src}，請確保檔案存在且為 PNG。`);
                if (imagesLoaded === leafSources.length) {
                    initLeaves();
                }
            };
            leafImages.push(img);
        });

        const leaves = [];
        const leafCount = 40; 

        function initLeaves() {
            for (let i = 0; i < leafCount; i++) {
                leaves.push({
                    x: Math.random() * leafCanvas.width,
                    y: Math.random() * leafCanvas.height,
                    img: leafImages.length > 0 ? leafImages[Math.floor(Math.random() * leafImages.length)] : null,
                    /* 楓葉調大: 40px ~ 90px */
                    size: Math.random() * 50 + 40, 
                    vY: Math.random() * 1.5 + 0.5, 
                    vX: Math.random() * 1 - 0.5,   
                    angle: Math.random() * 360,    
                    spin: Math.random() * 2 - 1    
                });
            }
            requestAnimationFrame(animateLeaves);
        }

        function animateLeaves() {
            leafCtx.clearRect(0, 0, leafCanvas.width, leafCanvas.height);

            leaves.forEach(leaf => {
                leaf.y += leaf.vY;
                leaf.x += leaf.vX;
                leaf.angle += leaf.spin;

                if (leaf.y > leafCanvas.height) {
                    leaf.y = -50;
                    leaf.x = Math.random() * leafCanvas.width;
                }
                if (leaf.x > leafCanvas.width + 50) leaf.x = -50;
                if (leaf.x < -50) leaf.x = leafCanvas.width + 50;

                if (leaf.img && leaf.img.complete && leaf.img.naturalWidth !== 0) {
                    leafCtx.save();
                    leafCtx.translate(leaf.x, leaf.y);
                    leafCtx.rotate(leaf.angle * Math.PI / 180);
                    leafCtx.drawImage(leaf.img, -leaf.size / 2, -leaf.size / 2, leaf.size, leaf.size);
                    leafCtx.restore();
                }
            });

            requestAnimationFrame(animateLeaves);
        }

        // ==========================================
        // Firebase 與核心系統邏輯
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyDNKre0ThjBoGVQPzzPNHelU9t_h469Ef8",
            authDomain: "scoreboard-18161.firebaseapp.com",
            projectId: "scoreboard-18161",

            storageBucket: "scoreboard-18161.firebasestorage.app",

        db.ref('shabi_scoreboard').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                users = data.users || {}; logs = data.logs || []; archives = data.archives || {}; honors = data.honors || [];
                rulesText = data.rulesText || "目前尚無設定規則...\n點擊右上角「修改規則」發布。";
            } else {
                users = {}; logs = []; archives = {}; honors = [];
                rulesText = "目前尚無設定規則...\n點擊右上角「修改規則」發布。";
            }

            renderHistory(); 
            renderArchives(); 
            renderHonors();
            renderRules(); 
        });

        function updateDatabase() { db.ref('shabi_scoreboard').set({ users, logs, archives, honors, rulesText }); }

        function verifyAdmin() {
            const pwd = prompt("🛑 核心重地，請輸入授權碼：");
            if (pwd === ADMIN_PASSWORD) return true;
            if (pwd !== null) alert("授權碼無效，退下！");
            return false;
        }

        function ensureUser(id) {
            if (!id) return false;
            if (!users[id]) {
                const name = prompt(`系統偵測到未註冊編號【${id}】，請題寫玩家名號：`);
                if (!name) return false;
                users[id] = { name: name, score: 0, zimo: 0, fangqiang: 0 };
            }
            return true;
        }

        function recordRon() {
            const wId = document.getElementById('ronWinner').value;
            const lId = document.getElementById('ronLoser').value;
            const pts = parseInt(document.getElementById('ronPoints').value);
            if (!wId || !lId || isNaN(pts) || pts <= 0) return alert("請填寫完整的胡牌資訊與分數！");
            if (!ensureUser(wId) || !ensureUser(lId)) return;
            users[wId].score += pts;
            users[lId].score -= pts;
            users[lId].fangqiang = (users[lId].fangqiang || 0) + 1;
            const timeString = new Date().toLocaleString();
            const rollbackData = { [wId]: { score: -pts }, [lId]: { score: pts, fangqiang: -1 } };
            logs.unshift({ id: Date.now().toString(), targetId: 'system_multi', text: `[${timeString}] 🎯 [放槍裁決] 編號 ${wId} (${users[wId].name}) 胡了 編號 ${lId} (${users[lId].name})，獲得 ${pts} 點。`, isValid: true, rollbackData: rollbackData });
            document.getElementById('ronWinner').value = ''; document.getElementById('ronLoser').value = ''; document.getElementById('ronPoints').value = '';
            updateDatabase();
        }

        function recordTsumo() {
            const wId = document.getElementById('tsumoWinner').value;
            const l1Id = document.getElementById('tsumoL1').value; const p1 = parseInt(document.getElementById('tsumoP1').value);
            const l2Id = document.getElementById('tsumoL2').value; const p2 = parseInt(document.getElementById('tsumoP2').value);
            const l3Id = document.getElementById('tsumoL3').value; const p3 = parseInt(document.getElementById('tsumoP3').value);
            if (!wId || !l1Id || !l2Id || !l3Id || isNaN(p1) || isNaN(p2) || isNaN(p3)) { return alert("請填滿自摸贏家與輸家的編號及點數！"); }
            if (!ensureUser(wId) || !ensureUser(l1Id) || !ensureUser(l2Id) || !ensureUser(l3Id)) return;
            const totalWin = p1 + p2 + p3;
            users[wId].score += totalWin;
            users[wId].zimo = (users[wId].zimo || 0) + 1;
            users[l1Id].score -= p1; users[l2Id].score -= p2; users[l3Id].score -= p3;
            const timeString = new Date().toLocaleString();
            const rollbackData = { [wId]: { score: -totalWin, zimo: -1 }, [l1Id]: { score: p1 }, [l2Id]: { score: p2 }, [l3Id]: { score: p3 } };
            logs.unshift({ id: Date.now().toString(), targetId: 'system_multi', text: `[${timeString}] ✨ [自摸裁決] 編號 ${wId} (${users[wId].name}) 通贏自摸！共贏得 ${totalWin} 點。(輸家各支付: ${p1}, ${p2}, ${p3})`, isValid: true, rollbackData: rollbackData });
            document.getElementById('tsumoWinner').value = '';
            document.getElementById('tsumoL1').value = ''; document.getElementById('tsumoP1').value = '';
            document.getElementById('tsumoL2').value = ''; document.getElementById('tsumoP2').value = '';
            document.getElementById('tsumoL3').value = ''; document.getElementById('tsumoP3').value = '';
            updateDatabase();
        }

        function recordAdjust() {
            const id = document.getElementById('adjId').value;
            const pts = parseInt(document.getElementById('adjPoints').value);
            if (!id || isNaN(pts)) return alert("請輸入目標編號與手動修正點數！");
            if (!ensureUser(id)) return;
            users[id].score += pts;
            const timeString = new Date().toLocaleString();
            logs.unshift({ id: Date.now().toString(), targetId: 'system_multi', text: `[${timeString}] ⚙️ [修正] 編號 ${id} (${users[id].name}) 點數修正 ${pts >= 0 ? '增加' : '扣除'} 了 ${Math.abs(pts)} 點。`, isValid: true, rollbackData: { [id]: { score: -pts } } });
            document.getElementById('adjId').value = ''; document.getElementById('adjPoints').value = '';
            updateDatabase();
        }

        function recordHonor() {
            const id = document.getElementById('honorId').value;
            const name = document.getElementById('honorName').value.trim();
            const tai = parseInt(document.getElementById('honorTai').value) || 0;
            if (!id || !name) return alert("請輸入目標編號與牌型描述！");
            if (!ensureUser(id)) return;
            const timeString = new Date().toLocaleString();
            honors.unshift({ id: Date.now().toString(), userId: id, userName: users[id].name, eventName: name, tai: tai, time: timeString });
            logs.unshift({ id: Date.now().toString(), targetId: 'system', points: 0, text: `[${timeString}] 🎖️ [榮譽] 恭賀 編號 ${id} (${users[id].name}) 達成特殊牌型：【${name}】！榮光永存。`, isValid: true });
            document.getElementById('honorId').value = ''; document.getElementById('honorName').value = ''; document.getElementById('honorTai').value = '';
            updateDatabase();
            alert("✅ 榮譽事蹟已永久保存！");
        }

        function undoAction(logId) {
            if (!verifyAdmin()) return;
            const logIndex = logs.findIndex(l => typeof l === 'object' && l.id === logId);
            if (logIndex > -1 && logs[logIndex].isValid) {
                const log = logs[logIndex]; 
                if (confirm(`確定要將此歷史紀錄完全抹除嗎？\n(包含所有相關玩家的分數與次數都將倒轉)`)) {
                    logs[logIndex].isValid = false;
                    if (log.rollbackData) {
                        for (let uid in log.rollbackData) {
                            if (users[uid]) {
                                const rb = log.rollbackData[uid];
                                if (rb.score) users[uid].score += rb.score;
                                if (rb.zimo) users[uid].zimo = Math.max(0, (users[uid].zimo || 0) + rb.zimo);
                                if (rb.fangqiang) users[uid].fangqiang = Math.max(0, (users[uid].fangqiang || 0) + rb.fangqiang);
                            }
                        }
                    } else if (log.targetId && log.targetId !== 'system' && log.targetId !== 'system_multi') {
                        const uid = log.targetId;
                        if (users[uid]) {
                            users[uid].score -= log.points;
                            if (log.isZimo) users[uid].zimo = Math.max(0, users[uid].zimo - 1);
                            if (log.isFangqiang) users[uid].fangqiang = Math.max(0, users[uid].fangqiang - 1);
                        }
                    }
                    honors = honors.filter(h => h.id !== logId);
                    updateDatabase();
                }
            }
        }

        function renderRules() { document.getElementById('rulesDisplay').innerText = rulesText; }
        function editRules() {
            document.getElementById('rulesDisplay').style.display = 'none';
            document.getElementById('rulesEditArea').style.display = 'block';
            document.getElementById('rulesInput').value = rulesText;
        }
        function cancelEditRules() {
            document.getElementById('rulesDisplay').style.display = 'block';
            document.getElementById('rulesEditArea').style.display = 'none';
        }
        function saveRules() {
            rulesText = document.getElementById('rulesInput').value;
            updateDatabase(); cancelEditRules();
            alert("✅ 規則已發布！");
        }

        function renameUser() {
            const id = document.getElementById('renameId').value;
            const newName = document.getElementById('renameName').value.trim();
            if (!id || !newName) { alert("請完整輸入編號與新名稱！"); return; }
            if (!users[id]) { alert(`找不到編號 ${id} 的資料！`); return; }
            const oldName = users[id].name; 
            users[id].name = newName;
            honors.forEach(h => { if(h.userId === id) h.userName = newName; });
            const timeString = new Date().toLocaleString();
            logs.unshift({ id: Date.now().toString(), targetId: 'system', points: 0, text: `[${timeString}] 🔄 通知：編號 ${id} 的名牌尊號已由 [${oldName}] 更改為 [${newName}]。`, isValid: true });
            document.getElementById('renameId').value = ''; document.getElementById('renameName').value = ''; 
            updateDatabase(); 
            alert(`✅ 改名題寫成功。`);
        }

        function deleteUser() {
            const id = document.getElementById('deleteId').value;
            if (!id) return; if (!users[id]) { alert(`目標 ${id} 不存在！`); return; }
            if (verifyAdmin()) {
                if (confirm(`警告：確定要將編號 ${id} (${users[id].name}) 從名冊完全抹除嗎？\n此客倌名號將永遠消失。`)) {
                    const deletedName = users[id].name; delete users[id];
                    const timeString = new Date().toLocaleString();
                    logs.unshift({ id: Date.now().toString(), targetId: 'system', points: 0, text: `[${timeString}] 🗑️ 裁決：編號 ${id} (${deletedName}) 註冊資料已被管理員刪除。`, isValid: true });
                    document.getElementById('deleteId').value = ''; updateDatabase(); 
                }
            }
        }

        function resetAll() {
            if (Object.keys(users).length === 0) return;
            if (verifyAdmin()) {
                if (confirm("警告：確定要終結本局赌局，將所有籌碼歸零並封存史冊嗎？\n(榮譽殿堂傳說將永久保存)")) {
                    const timeString = new Date().toLocaleString(); const archiveId = Date.now().toString(); 
                    archives[archiveId] = { name: `終局結算封存史冊 - ${timeString}`, users: JSON.parse(JSON.stringify(users)), logs: JSON.parse(JSON.stringify(logs)) };
                    for (let id in users) { users[id].score = 0; users[id].zimo = 0; users[id].fangqiang = 0; }
                    logs = []; 
                    logs.unshift({ id: Date.now().toString(), targetId: 'system', points: 0, text: `[${timeString}] ⚠️ 裁決：赌局已終結，籌碼歸零，前局史料已存入歷史卷宗。`, isValid: true });
                    updateDatabase(); 
                }
            }
        }

        function searchScore() {
            const id = document.getElementById('searchId').value;
            const resultDiv = document.getElementById('searchResult'); 
            const statsDiv = document.getElementById('searchStatsResult'); 
            const historyDiv = document.getElementById('searchHistoryResult');
            if (!id) return;
            if (users[id]) {
                const z = users[id].zimo || 0; const f = users[id].fangqiang || 0;
                resultDiv.innerText = `➤ 目標：${id} (名號：${users[id].name}) // 當前籌碼 ${users[id].score}`;
                statsDiv.innerHTML = `🀄 自摸通贏: <span class="stat-zimo">${z}</span> 次 ｜ 💥 胡牌點炮: <span class="stat-fang">${f}</span> 次`;
                const userLogs = logs.filter(log => { 
                    if (typeof log === 'string') return log.includes(`編號 ${id}`); 
                    return log.targetId === id || log.text.includes(`編號 ${id}`); 
                }).map(log => { 
                    if (typeof log === 'string') return log; 
                    return log.isValid ? log.text : `<span class="invalid-log">${log.text} (已抹除)</span>`; 
                });
                if (userLogs.length > 0) { historyDiv.innerHTML = `<strong>此玩家近期事蹟紀錄：</strong><br><div style="max-height: 150px; overflow-y: auto; margin-top: 5px; border-left: 3px solid #bf953f; padding-left: 10px;">` + userLogs.join('<br><br>') + `</div>`; } else { historyDiv.innerHTML = '此人目前尚無事蹟紀錄。'; }
            } else { resultDiv.innerText = `➤ 查無名號：編號 ${id}。`; statsDiv.innerHTML = ''; historyDiv.innerHTML = ''; }
        }

        function deleteHonor(honorId) {
            if (verifyAdmin()) { if(confirm("確定要把這個事蹟從榮譽殿堂中抹去嗎？")) { honors = honors.filter(h => h.id !== honorId); updateDatabase(); } }
        }

        function setScoreSort(type) {
            currentScoreSort = type;
            document.getElementById('sortScoreBtnId').classList.toggle('active', type === 'id');
            document.getElementById('sortScoreBtnPts').classList.toggle('active', type === 'score');
            document.getElementById('sortScoreBtnZimo').classList.toggle('active', type === 'zimo');
            document.getElementById('sortScoreBtnFang').classList.toggle('active', type === 'fangqiang');
            renderScoreboard();

        function setHonorSort(type) {
            currentHonorSort = type;
            document.getElementById('sortHonorBtnTime').classList.toggle('active', type === 'time');
            document.getElementById('sortHonorBtnId').classList.toggle('active', type === 'id');
            document.getElementById('sortHonorBtnTai').classList.toggle('active', type === 'tai');
            renderHonors();
        }

        // ==========================================
        // 🏆 排行榜渲染：純淨光影特效，無流光，不跑版
        // ==========================================
        function renderScoreboard() {
            const tbody = document.getElementById('scoreboardBody'); tbody.innerHTML = ''; 
            let userArray = Object.keys(users).map(id => ({ id: id, ...users[id] }));
            let totalScore = 0;

            const topScoresArray = [...userArray].sort((a,b) => b.score - a.score);
            const validTopUsers = topScoresArray.filter(u => u.score > 0);
            const rank1Id = validTopUsers[0] ? validTopUsers[0].id : null;
            const rank2Id = validTopUsers[1] ? validTopUsers[1].id : null;
            const rank3Id = validTopUsers[2] ? validTopUsers[2].id : null;

            if (currentScoreSort === 'id') { userArray.sort((a, b) => parseInt(a.id) - parseInt(b.id)); } 
            else if (currentScoreSort === 'score') { userArray.sort((a, b) => b.score - a.score); } 
            else if (currentScoreSort === 'zimo') { userArray.sort((a, b) => (b.zimo || 0) - (a.zimo || 0)); } 
            else if (currentScoreSort === 'fangqiang') { userArray.sort((a, b) => (b.fangqiang || 0) - (a.fangqiang || 0)); }

            userArray.forEach(user => {
                totalScore += user.score;
                
                let trClass = '';
                let scoreStyle = '';

                // 純粹的漸層底色與發光字體
                if (user.id === rank1Id) { 
                    trClass = 'rank-1'; 
                    scoreStyle = 'color:#fcf6ba; text-shadow:0 0 8px rgba(212,175,55,0.6);';
                }
                else if (user.id === rank2Id) { 
                    trClass = 'rank-2'; 
                    scoreStyle = 'color:#e0eaf5; text-shadow:0 0 8px rgba(168,168,168,0.6);';
                }
                else if (user.id === rank3Id) { 
                    trClass = 'rank-3'; 
                    scoreStyle = 'color:#e3c4a8; text-shadow:0 0 8px rgba(168,123,81,0.6);';
                }

                const tr = document.createElement('tr'); 
                if (trClass) tr.className = trClass; 

                tr.innerHTML = `
                    <td>${user.id}</td>
                    <td>${user.name}</td>
                    <td><strong style="${scoreStyle}">${user.score}</strong></td>
                    <td><span class="stat-zimo">${user.zimo||0}</span></td>
                    <td><span class="stat-fang">${user.fangqiang||0}</span></td>
                `; 
                tbody.appendChild(tr);
            });

            const totalSpan = document.getElementById('totalCheck');
            if(totalSpan) {
                totalSpan.innerText = `[總籌碼核算: ${totalScore}]`;
                if (totalScore === 0) { totalSpan.className = 'total-zero'; totalSpan.style.borderColor = '#4caf50'; } 
                else { totalSpan.className = 'total-error'; totalSpan.style.borderColor = '#ff5252'; }
            }
        }

        function renderHistory() {
            const historyBox = document.getElementById('historyBox'); historyBox.innerHTML = '';
            logs.forEach(log => {
                const div = document.createElement('div'); div.className = 'log-item';
                if (typeof log === 'string') { div.innerHTML = `<span>${log}</span>`; } else {
                    if (!log.isValid) { div.innerHTML = `<span class="invalid-log">${log.text} (已抹除)</span>`; } else {
                        const undoBtn = log.targetId !== 'system' ? `<button class="action-btn btn-dark btn-small" onclick="undoAction('${log.id}')">撤銷</button>` : ''; div.innerHTML = `<span>${log.text}</span> ${undoBtn}`;
                    }
                }
                historyBox.appendChild(div);
            });
        }

        function renderHonors() {
            const honorList = document.getElementById('honorList'); honorList.innerHTML = '';
            let displayHonors = [...honors];
            if (currentHonorSort === 'id') { displayHonors.sort((a, b) => parseInt(a.userId) - parseInt(b.userId)); } 
            else if (currentHonorSort === 'tai') { displayHonors.sort((a, b) => (b.tai || 0) - (a.tai || 0)); }
            if (displayHonors.length > 0) {
                displayHonors.forEach(h => {
                    const div = document.createElement('div'); div.className = 'honor-item';
                    const taiDisplay = h.tai ? `<span style="color: #ff5252; margin-left: 5px; font-size:0.85em; text-shadow:none;">[${h.tai} 番]</span>` : '';
                    div.innerHTML = `<div style="display: flex; flex-direction: column;"><span class="honor-text">🎖️ 【${h.eventName}】 ${taiDisplay}</span><span class="honor-user">達成玩家：${h.userName} (編號 ${h.userId}) // 登記日期：${h.time.split(' ')[0]}</span></div><button class="action-btn btn-dark btn-small" onclick="deleteHonor('${h.id}')">除名 (驗證印信)</button>`;
                    honorList.appendChild(div);
                });
            } else { honorList.innerHTML = '<p style="color: #888; font-style: italic;">目前Hall of Fame尚無傳說降臨...</p>'; }
        }

        function toggleArchive(archiveId) {
            const contentDiv = document.getElementById(`archive-content-${archiveId}`);
            if (contentDiv.style.display === 'block') { contentDiv.style.display = 'none'; return; }
            const archive = archives[archiveId];
            const sortedIds = Object.keys(archive.users || {}).sort((a, b) => parseInt(a) - parseInt(b));
            const chartLabels = []; const chartZimoData = []; const chartFangData = [];
            let sbHtml = '<div class="table-wrapper"><table><thead><tr><th>編號</th><th>名號</th><th>最終籌碼</th><th>自摸</th><th>放炮</th></tr></thead><tbody>';
            sortedIds.forEach(id => {
                const user = archive.users[id]; const z = user.zimo || 0; const f = user.fangqiang || 0;
                chartLabels.push(`${id}.${user.name}`); chartZimoData.push(z); chartFangData.push(f);
                sbHtml += `<tr><td>${id}</td><td>${user.name}</td><td><strong>${user.score}</strong></td><td class="stat-zimo">${z}</td><td class="stat-fang">${f}</td></tr>`;
            });
            sbHtml += '</tbody></table></div>';
            let logsHtml = '<div class="history-box" style="margin-top: 15px;">';
            (archive.logs || []).forEach(log => {
                const logText = typeof log === 'string' ? log : log.text;
                logsHtml += `<div class="log-item"><span>${logText}</span></div>`;
            });
            logsHtml += '</div>';
            const chartCanvasId = `chartCanvas-${archiveId}`;
            const chartHtml = `<h4 style="margin-top: 20px;">📈 結算統計圖 // King of Autumn</h4><div class="chart-container" style="background:#fff; padding:10px; border-radius:4px; border:1px solid #d1c7b4;"><canvas id="${chartCanvasId}"></canvas></div>`;
            contentDiv.innerHTML = `<h4>📊 史冊對局客倌名冊</h4>${sbHtml}${chartHtml}<h4 style="margin-top: 20px;">📜 終局前事蹟史料</h4>${logsHtml}`;
            contentDiv.style.display = 'block';
            const ctxChart = document.getElementById(chartCanvasId).getContext('2d');
            new Chart(ctxChart, { type: 'bar', data: { labels: chartLabels, datasets: [{ label: '自摸次數', data: chartZimoData, backgroundColor: 'rgba(76, 175, 80, 0.7)', borderColor: '#4caf50', borderWidth: 1 }, { label: '放炮次數', data: chartFangData, backgroundColor: 'rgba(255, 82, 82, 0.7)', borderColor: '#ff5252', borderWidth: 1 }] }, options: { responsive: true, scales: { y: { beginAtZero: true, ticks: { stepSize: 1, color: '#333' }, grid: { color: 'rgba(0,0,0,0.05)' } }, x: { ticks: { color: '#111' }, grid: { color: 'rgba(0,0,0,0.05)' } } }, plugins: { legend: { labels: { color: '#111' } } } } });
        }

        function renderArchives() {
            const container = document.getElementById('archivesList'); container.innerHTML = '';
            const archiveIds = Object.keys(archives).sort((a, b) => b - a);
            if (archiveIds.length === 0) { container.innerHTML = '<p style="color: #666; font-style: italic;">史冊庫目前為空。</p>'; return; }
            archiveIds.forEach(archiveId => {
                const div = document.createElement('div'); div.style = "border: 1px solid #4a2a18; padding: 12px; margin-bottom: 10px; border-radius: 4px; background: rgba(0,0,0,0.6); border-left: 4px solid #d4af37;";
                div.innerHTML = `<div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;"><strong style="color: #fcf6ba;">${archives[archiveId].name}</strong><div><button class="action-btn btn-small btn-dark" onclick="toggleArchive('${archiveId}')">翻閱史冊卷宗</button></div></div><div id="archive-content-${archiveId}" class="archive-content"></div>`;
                container.appendChild(div);
            });
        }

        const fortunes = [
            { title: "大吉", icon: "🐉", color: "#FFD700", desc: "氣勢如虹，看破聽牌。對手宜早降。" },
            { title: "中吉", icon: "🏮", color: "#FF4500", desc: "運勢順暢，別人放炮躲不掉。贏錢足夠大吃。" },
            { title: "小吉", icon: "🍵", color: "#32CD32", desc: "防守要務，求安全下莊。跟張少輸即贏。" },
            { title: "凶", icon: "💸", color: "#808080", desc: "打東來東，點炮。負責泡茶倒水吧。" },
            { title: "大凶", icon: "💀", color: "#000000", desc: "連單吊聽牌都會被攔截。錢包放桌上吧。" }
        ];

        function drawFortune() {
            const id = document.getElementById('fortuneTargetId').value;
            if (!id || !ensureUser(id)) return alert("請輸入有效的玩家編號。");
            const resultCard = document.getElementById('fortuneResult');
            const icon = document.getElementById('fortuneIcon');
            const title = document.getElementById('fortuneTitle');
            const desc = document.getElementById('fortuneDesc');
            const btn = document.getElementById('btnDrawFortune');
            const now = Date.now();
            if (users[id].fortune && (now - users[id].fortune.timestamp < 12 * 60 * 60 * 1000)) {
                return alert("⏳ 距離上次占卜未滿12小時，請勿頻繁祈求。");
            }
            btn.disabled = true; resultCard.style.display = 'block';
            let count = 0;
            const shuffleInterval = setInterval(() => {
                icon.innerText = "🎲"; title.innerText = "演算中..."; 
                desc.innerText = `正在攔截獲取您的今日麻將運勢...`;
                count++;
                if (count > 20) {
                    clearInterval(shuffleInterval);
                    const finalF = fortunes[Math.floor(Math.random() * fortunes.length)];
                    icon.innerText = finalF.icon; title.innerText = finalF.title;
                    title.style.color = finalF.color;
                    desc.innerText = finalF.desc;
                    users[id].fortune = { timestamp: now };
                    updateDatabase();
                    btn.disabled = false;
                }
            }, 60);
        }
    </script>
</body>
</html>
